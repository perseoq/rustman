version: "3.9"
services:
  mysql:
    image: mariadb:11
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: tickets_soporte
    ports: ["3306:3306"]
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
  api:
    build: .
    depends_on: [mysql]
    environment:
      DATABASE_URL: mysql://root:secret@mysql:3306/tickets_soporte
    ports: ["8000:8000"]
volumes:
  mysql_data:
